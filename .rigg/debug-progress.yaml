id: debug-progress
steps:
  - id: preflight_wait
    type: shell
    with:
      command: sleep 2
      result: none

  - id: codex_probe
    type: codex
    with:
      kind: turn
      model: gpt-5.1-codex-mini
      prompt: |
        Inspect this repository and produce a short debug note for a workflow progress UI check.

        Constraints:
        - Do not modify any files.
        - Read only a few files.
        - Mention at least one file path you inspected.
        - Keep the answer concise.

  - id: midrun_wait
    type: shell
    with:
      command: sleep 2
      result: none

  - id: summarize
    type: codex
    with:
      kind: turn
      model: gpt-5.1-codex-mini
      prompt: |
        Turn the note below into a compact final summary for a human operator.

        Requirements:
        - Keep it to 3 short bullet points.
        - Mention that this run is intended for debugging progress rendering.
        - Do not ask follow-up questions.

        Note:
        ${{ steps.codex_probe.result }}

  - id: write
    type: write_file
    with:
      path: .rigg/debug-progress.md
      content: |
        # Debug Progress Run

        ## Probe
        ${{ steps.codex_probe.result }}

        ## Summary
        ${{ steps.summarize.result }}
