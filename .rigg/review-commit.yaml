id: review-commit
inputs:
  commit_sha:
    type: string
    description: Commit to review
steps:
  - id: remediation
    type: loop
    max: 5
    until: ${{ len(steps.review.result.findings) == 0 }}
    steps:
      - id: review
        type: codex
        with:
          action: review
          model: gpt-5.4
          review:
            target:
              type: commit
              sha: ${{ inputs.commit_sha }}

      - id: fix
        if: ${{ len(steps.review.result.findings) > 0 }}
        type: codex
        with:
          action: run
          model: gpt-5.4
          prompt: |
            Address the accepted findings from this review.
            Make the smallest correct code changes needed to resolve them.

            Review:
            ${{ toJSON(steps.review.result) }}
