id: review-fix
steps:
  - id: remediation
    type: loop
    max: 5
    until: ${{ len(steps.review.result.findings) == 0 }}
    steps:
      - id: review
        type: codex
        with:
          kind: review
          model: gpt-5.3-codex-spark
          target:
            type: uncommitted

      - id: fix
        if: ${{ len(steps.review.result.findings) > 0 }}
        type: cursor
        with:
          mode: agent
          model: composer-2-fast
          prompt: |
            Fix these code review findings:
            ${{ toJSON(steps.review.result.findings) }}

  - id: commit
    type: shell
    with:
      command: |
        git add -A
        if ! git diff --cached --quiet; then
          git commit -m "fix: review remediation"
        fi
      stdout:
        mode: none
