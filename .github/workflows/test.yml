name: test

on:
  pull_request:
    paths:
      - package.json
      - bun.lock
      - tsconfig.json
      - packages/rigg/**
      - .github/workflows/test.yml
  push:
    branches:
      - main
    paths:
      - package.json
      - bun.lock
      - tsconfig.json
      - packages/rigg/**
      - .github/workflows/test.yml
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

      - name: Build standalone CLI
        run: bun run --cwd packages/rigg build:cli

      - name: Smoke test standalone CLI
        run: |
          tmpdir="$(mktemp -d)"
          ./packages/rigg/dist/rigg --version
          cp ./packages/rigg/dist/rigg "$tmpdir/rigg"
          (
            cd "$tmpdir"
            chmod 0755 ./rigg
            ./rigg init
            ./rigg validate
          )
