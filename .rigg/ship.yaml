id: ship
inputs:
  requirements:
    type: string
    description: Feature requirements
  greenfield:
    type: boolean
    description: Greenfield project — skip backward-compatibility findings in review
    default: false

steps:
  - id: design
    type: workflow
    with:
      workflow: ux-design
      inputs:
        requirements: ${{ inputs.requirements }}

  - id: plan
    type: workflow
    with:
      workflow: plan
      inputs:
        requirements: ${{ inputs.requirements }}
        ux_design: private/ux-design.md

  - id: implement
    type: codex
    with:
      kind: turn
      model: gpt-5.4
      effort: high
      prompt: |
        You are a senior engineer implementing a feature according to a finalized plan.

        ## Requirements
        ${{ inputs.requirements }}

        ## Task
        1. Read `private/plan.md` — this is your implementation plan. Follow it step by step.
        2. Read `private/ux-design.md` — this is your UX spec. Match all output formats,
           error messages, and interaction flows exactly.
        3. Read `private/typescript-implementation-guide.md` — follow all coding standards.
        4. Implement each step from the plan in order. After each step, verify with the
           command specified in the plan.
        5. After all steps are complete, run in order and fix any errors:
           - `bun run format`
           - `bun run check`
           - `bun test`

        ## Rules
        - Follow the plan exactly. Do not add scope, skip steps, or deviate from the design.
        - If the plan specifies a type signature, use it verbatim.
        - If the UX design specifies an error message, output format, or CLI flag, match it exactly.
        - Do not add comments, docstrings, or documentation unless the plan calls for it.
        - If a step's verification command fails, fix the issue before moving on.

  - id: commit
    type: shell
    env:
      REQUIREMENTS: ${{ inputs.requirements }}
    with:
      command: |
        git add -A
        if ! git diff --cached --quiet; then
          SUMMARY=$(echo "$REQUIREMENTS" | head -1 | cut -c1-60)
          git commit -m "feat: $SUMMARY"
        fi
      result: none

  - id: review
    type: workflow
    with:
      workflow: review
      inputs:
        greenfield: ${{ inputs.greenfield }}
