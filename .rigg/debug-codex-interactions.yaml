id: debug-codex-interactions
inputs:
  artifact_path:
    type: string
    default: .rigg/debug-codex-interactions-artifact.txt
    minLength: 1
  fallback_label:
    type: string
    default: fallback-label
    minLength: 1
steps:
  - id: codex_interactions
    type: codex
    with:
      action: run
      model: gpt-5.3-codex
      prompt: |
        This run is specifically for debugging Rigg's Codex user-input handling.

        You must use the `request_user_input` tool exactly once before doing anything else.
        Do not ask the question in a normal assistant message.
        Do not continue until the tool returns an answer.
        If you ask in plain text instead of using `request_user_input`, that is a failure.

        Ask exactly one free-form question with:
        - id: debug_label
        - header: Debug Label
        - question: What short debug label should I use for this run?

        After the tool returns:
        - If the answer is empty or unusable, use `${{ inputs.fallback_label }}`.
        - Otherwise use the returned label.

        Then follow this checklist in order:
        1. Run exactly one harmless shell command: `pwd`
        2. Write a small text file to `${{ inputs.artifact_path }}` with these lines:
           - purpose=debug-codex-interactions
           - label=<resolved label>
           - command=pwd
        3. Return a short plain-text summary of what happened.

        Constraints:
        - Do not inspect unrelated files.
        - Do not run additional commands.
        - Keep the file contents small and plain text.
        - If an approval is denied, say so plainly in the final summary.

  - id: write_snapshot
    type: write_file
    with:
      path: .rigg/debug-codex-interactions.md
      content: |
        # Debug Codex Interactions

        artifact_path: ${{ inputs.artifact_path }}

        summary:
        ${{ steps.codex_interactions.result }}
