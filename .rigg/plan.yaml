id: plan
inputs:
  requirements:
    type: string
    description: Requirements for the implementation plan
  output_path:
    type: string
    description: Path to write the generated plan
steps:
  - id: draft
    type: codex
    with:
      action: run
      model: gpt-5.4
      prompt: |
        Draft a detailed implementation plan from the requirements below.

        Requirements:
        ${{ inputs.requirements }}

  - id: critique
    type: codex
    with:
      action: run
      model: gpt-5.4
      prompt: |
        Review this implementation plan critically.
        Identify ambiguities, flawed assumptions, and missing edge cases.

        Draft:
        ${{ steps.draft.result }}

  - id: refine
    type: codex
    with:
      action: run
      model: gpt-5.4
      prompt: |
        Improve the plan below using the critique.
        Preserve concrete file paths, milestones, and validation steps.

        Draft:
        ${{ steps.draft.result }}

        Critique:
        ${{ steps.critique.result }}

  - id: write
    type: write_file
    with:
      path: ${{ inputs.output_path }}
      content: ${{ steps.refine.result }}
