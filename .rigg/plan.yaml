id: plan
inputs:
  requirements:
    type: string
    description: Requirements for the implementation plan
  filename:
    type: string
    description: Output filename (written to private/<filename>)
    default: plan.md

steps:
  - id: explore
    type: shell
    env:
      REQUIREMENTS: ${{ inputs.requirements }}
    with:
      command: |
        claude -p \
          --model claude-opus-4-6 \
          --append-system-prompt-file private/typescript-implementation-guide.md \
          --tools "Read,Glob,Grep,Bash" \
          --allowedTools "Read,Glob,Grep,Bash" \
          --max-turns 15 \
          --no-session-persistence \
          --output-format text \
          "You are a senior software architect and product engineer preparing context for an implementation plan.

        # Project: Rigg
        - Language: TypeScript 5.9 (strict, erasableSyntaxOnly)
        - Runtime: Bun 1.3.10
        - Monorepo:
          - packages/rigg — workflow engine CLI (React 19, Ink 6, Zod 4, YAML 2.8)
          - packages/www — documentation site (Astro 6, Starlight)
        - Test: bun test (table-driven, mock only at I/O boundaries)
        - Format: Prettier (no semicolons, printWidth 120)
        - CI: GitHub Actions

        # Requirements
        $REQUIREMENTS

        # Task
        Explore the codebase to gather ALL context needed — both implementation AND product/UX.

        ## Implementation exploration
        1. Use Glob and Grep to find files related to the requirements
        2. Read the actual source code of relevant modules, types, and tests
        3. Map how the relevant code connects to the rest of the system
        4. Find similar patterns and conventions already in the codebase
        5. Check recent git history for related changes

        ## Product and UX exploration
        6. Read the CLI entry point, command definitions, and Ink components to understand the user-facing surface
        7. Analyze how Rigg currently communicates with the user: progress indicators, success/error output, formatting conventions
        8. Trace the user journey through features related to the requirements — what does the user see, type, and expect at each step?
        9. Read existing error messages and help text to understand the tone and information density
        10. Check the docs site (packages/www) for how this feature area is documented or would need to be

        # Output format
        Produce ONLY this structured document. No preamble, no meta-commentary.

        ### Product context
        What Rigg is, who uses it, and how the requirements fit into the user's workflow.
        What is the user trying to accomplish? What do they see today?

        ### UI and UX patterns
        How the CLI presents information to the user:
        - Ink components used (spinners, tables, progress bars, etc.)
        - Output formatting conventions (colors, icons, indentation)
        - Error display patterns (how errors are shown, what information is included)
        - Interaction model (flags, prompts, streaming output)

        ### Architecture overview
        How the relevant parts of the codebase are structured.

        ### Relevant files
        | Path | Purpose | Key exports/types |
        |------|---------|-------------------|
        Every file relevant to the implementation, including UI components.

        ### Existing patterns
        Conventions and abstractions the codebase already uses.

        ### Key type definitions
        Relevant types copied verbatim from the source code.

        ### Test patterns
        How existing tests are structured in the relevant areas.

        ### Constraints and gotchas
        Anything discovered during exploration that the implementer needs to know.

        Base everything on what you actually read from the codebase. No assumptions."

  - id: draft
    type: codex
    with:
      action: plan
      model: gpt-5.4
      effort: high
      prompt: |
        You are a senior software architect creating an implementation plan.

        CRITICAL: Your response is saved directly to a markdown file. Output ONLY the plan.
        No investigation notes, no thinking, no preamble. Start with "### 1. Summary".

        # Project: Rigg

        ## Tech stack
        - Language: TypeScript 5.9 (strict, erasableSyntaxOnly)
        - Runtime: Bun 1.3.10
        - Monorepo:
          - packages/rigg — workflow engine CLI (React 19, Ink 6, Zod 4, YAML 2.8)
          - packages/www — documentation site (Astro 6, Starlight)
        - Test: bun test (table-driven, mock only at I/O boundaries)
        - Format: Prettier (no semicolons, printWidth 120)
        - CI: GitHub Actions

        ## Codebase context (gathered by active codebase exploration)
        ${{ steps.explore.result }}

        ## Implementation guide
        Read `private/typescript-implementation-guide.md` in full before drafting.
        The plan MUST conform to its rules:
        - Function-first, data-first design (no premature class/abstract/base)
        - `unknown` at system boundaries, validate with Zod, `safeParse` preferred
        - Discriminated unions for state, not nullable field combinations
        - `type` by default, `interface` only for open extension
        - No enum, namespace, const enum, or class-heavy patterns
        - Error handling at I/O boundaries only; no global Result type
        - Source of truth derives types (Zod → z.infer, not hand-duplicated)

        ## Requirements
        ${{ inputs.requirements }}

        ## Task
        Produce an implementation plan in this exact structure:

        ### 1. Summary
        What this change does and why. One paragraph.

        ### 2. User experience design
        How this change affects what the user sees, types, and feels. Must include:
        - **Interaction flow** — Step-by-step: what the user does and what they see at each point
        - **Output design** — Exact format of CLI output (progress, results, errors). Be specific: show example output.
        - **Error states** — Every error the user could hit, with the exact message they should see. Messages must be actionable (tell the user what to do, not just what went wrong).
        - **Edge cases** — Empty input, large repos, interrupted runs, missing files — what happens?
        - **Consistency** — How this fits with existing Rigg CLI patterns (refer to the UX patterns from codebase context).

        ### 3. Files
        | Path | Action | Purpose |
        |------|--------|---------|
        Every file to create, modify, or delete.

        ### 4. Implementation steps
        Numbered list. Each step MUST include:
        - Concrete action (e.g. "Add type WorkflowResult to packages/rigg/src/compile/schema.ts")
        - Target file path(s)
        - Key type signatures or data shapes being introduced
        - Verification command (`bun test <path>`, `bunx tsc --noEmit`, or what to manually check)

        ### 5. Testing strategy
        Test files to create or update. Specific cases to cover.
        Include UX-relevant test cases: error message content, output formatting, edge case behavior.

        ### 6. Risks and open questions
        Potential issues, trade-offs, or questions to resolve before starting.

        ## Rules
        - Reference actual paths from the codebase context above. Follow existing naming conventions for new files.
        - Minimal scope — fewest files, simplest approach that satisfies the requirements.
        - Every step must be independently verifiable.
        - Do not propose abstractions the codebase does not already use.
        - Do not propose config, env vars, or feature flags unless the requirements demand them.
        - **External dependencies**: If the plan introduces a new package or upgrades an existing one, you MUST:
          1. Search the web for the latest stable release of that package (npm registry, GitHub releases, or official site).
          2. Pin the plan to that exact version (e.g. "install foo@3.2.1", not "install foo").
          3. Fetch and read the official documentation or migration guide for that version.
          4. Note the primary source URL in the plan so the implementer can verify.
          Do NOT rely on your training data for version numbers — always search live.

        REMINDER: Your entire response goes into a file as-is. No preamble. First line = "### 1. Summary".

  - id: critique
    type: shell
    env:
      PLAN: ${{ steps.draft.result }}
    with:
      command: |
        printf '%s' "$PLAN" | claude -p \
          --model claude-opus-4-6 \
          --append-system-prompt-file private/typescript-implementation-guide.md \
          --tools "Read,Glob,Grep,Bash" \
          --allowedTools "Read,Glob,Grep,Bash" \
          --max-turns 10 \
          --no-session-persistence \
          --output-format text \
          "You are auditing an implementation plan for the Rigg project (TypeScript 5.9, Bun 1.3.10).

        The implementation plan is provided via stdin. Read it carefully.

        ## Target persona
        Senior/staff engineer who:
        - Runs Rigg workflows from the terminal as part of their daily coding loop
        - Expects CLI output to be scannable — no walls of text, no ambiguous states
        - Treats YAML workflow files as code: they should be readable, diffable, composable
        - Will hit edge cases fast — empty inputs, interrupted runs, large repos
        - Values fast feedback loops
        - Has strong opinions on DX: error messages must be actionable

        ## Task
        ACTIVELY VERIFY the plan against the actual codebase:
        1. Use Glob to check that referenced file paths exist (or that parent dirs exist for new files)
        2. Use Read to verify that types/functions mentioned in the plan actually exist in those files
        3. Use Grep to confirm API signatures and patterns the plan depends on

        Then score each dimension PASS or FAIL with a one-line reason:

        **Implementation quality**
        1. **Paths** — All referenced file paths exist in the repo or follow its naming conventions for new files.
        2. **Ordering** — Steps respect dependencies; no step requires output of a later step.
        3. **Completeness** — No missing steps to fully satisfy the requirements.
        4. **Type design** — Proposed types conform to the implementation guide (discriminated unions, Zod-first, no enum).
        5. **Error handling** — Error paths addressed at system boundaries per the guide.
        6. **Tests** — Proposed tests are sufficient and follow bun test patterns (table-driven, no unnecessary mocks).
        7. **Minimality** — No scope creep, over-engineering, or unnecessary abstractions.

        **External dependencies**
        8. **Versions** — Every new or upgraded package specifies an exact latest-stable version confirmed via live search, not a guess or range.
        9. **Primary sources** — Each dependency cites an official docs URL or migration guide for the pinned version.

        **User experience (from the persona perspective)**
        10. **UX design present** — Does the plan include a concrete user experience design (section 2)? Not just implementation, but what the user sees and feels.
        11. **Output design** — Are CLI outputs specific and example-driven? Vague descriptions like 'show progress' fail; exact output format with examples passes.
        12. **Error messages** — Every error state has an actionable message. Read existing error patterns in the codebase to verify consistency.
        13. **Edge cases** — Empty input, large repos, interrupted runs, missing files — are they explicitly addressed?
        14. **Consistency** — Does the UX match existing Rigg CLI patterns? Check actual Ink components and output conventions in the codebase.
        15. **Workflow composability** — Does this change play well with existing .rigg workflows and not break the user's muscle memory?

        If all items PASS, respond with exactly: LGTM

        Otherwise, list only the FAILing items with specific, actionable fixes. Be concise — one fix per item."

  - id: finalize
    type: branch
    cases:
      - if: ${{ contains(steps.critique.result, 'LGTM') }}
        steps:
          - id: write_as_is
            type: write_file
            with:
              path: private/${{ inputs.filename }}
              content: ${{ steps.draft.result }}

          - id: strip_preamble_draft
            type: shell
            env:
              TARGET: private/${{ inputs.filename }}
            with:
              command: |
                if grep -q '^### 1\. Summary' "$TARGET"; then
                  sed -n '/^### 1\. Summary/,$p' "$TARGET" > "$TARGET.tmp" && mv "$TARGET.tmp" "$TARGET"
                fi
              result: none

      - else:
        steps:
          - id: refine
            type: codex
            with:
              action: run
              model: gpt-5.4
              effort: medium
              prompt: |
                You are revising an implementation plan. The review found issues that need fixing,
                but the original plan contains important context, constraints, and design decisions
                that MUST be preserved.

                CRITICAL: Your response is saved directly to a markdown file. Output ONLY the revised plan.
                No investigation notes, no thinking, no preamble. Start with "### 1. Summary".

                Read `private/typescript-implementation-guide.md` for the project's coding standards.

                ## Original plan (this is the source of truth)
                ${{ steps.draft.result }}

                ## Review findings (fix only these)
                ${{ steps.critique.result }}

                ## Instructions
                Your output is a COMPLETE, SELF-CONTAINED plan — not a patch, not a summary of changes.
                A reader who never saw the original must be able to implement from your output alone.

                Revision rules:
                1. Start from a verbatim copy of the original plan. Only modify the parts that the FAILing items require.
                2. Preserve ALL of the following from the original:
                   - Summary context (the "what" and "why")
                   - Every file entry, implementation step, and test case that was NOT flagged
                   - Design decisions, constraints, and rationale
                   - Specific type signatures, data shapes, and code-level details
                3. For each FAILing item, make the minimum edit that resolves it. Do not rewrite surrounding content.
                4. Do not add scope, features, or steps beyond what the findings require.
                5. Keep the same structure: Summary → User experience design → Files → Implementation steps → Testing strategy → Risks.
                6. If the original plan has N implementation steps and only step 3 was flagged, the output must still have all N steps (with step 3 revised).

                REMINDER: Your entire response goes into a file as-is. No preamble. First line = "### 1. Summary".

          - id: write_refined
            type: write_file
            with:
              path: private/${{ inputs.filename }}
              content: ${{ steps.refine.result }}

          - id: strip_preamble_refined
            type: shell
            env:
              TARGET: private/${{ inputs.filename }}
            with:
              command: |
                if grep -q '^### 1\. Summary' "$TARGET"; then
                  sed -n '/^### 1\. Summary/,$p' "$TARGET" > "$TARGET.tmp" && mv "$TARGET.tmp" "$TARGET"
                fi
              result: none
