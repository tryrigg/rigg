id: debug-conversations
inputs:
  task:
    type: string
    default: Summarize the repository areas that matter for debugging Rigg workflows.
steps:
  - id: setup_context
    type: codex
    with:
      action: exec
      model: gpt-5.1-codex-mini
      prompt: |
        Inspect this repository and write a short note about files or subsystems relevant to debugging Rigg workflows.

        Constraints:
        - Do not modify any files.
        - Read only a handful of files.
        - Mention at least two concrete file paths.
      conversation:
        name: repo_debugger
        scope: workflow

  - id: continue_context
    type: codex
    with:
      action: exec
      model: gpt-5.1-codex-mini
      prompt: |
        Continue the same analysis and turn it into a compact debugging checklist for this task:
        ${{ inputs.task }}

        Reuse the existing conversation context instead of starting over.
      conversation:
        name: repo_debugger
        scope: workflow

  - id: refine
    type: loop
    max: 2
    until: ${{ steps.evaluate.result.accepted }}
    steps:
      - id: draft
        type: codex
        with:
          action: exec
          model: gpt-5.1-codex-mini
          prompt: |
            Iteration ${{ run.iteration }} of ${{ run.max_iterations }}.
            Produce a short operator note for debugging this workflow engine.

            Seed checklist:
            ${{ steps.continue_context.result }}
          conversation:
            name: loop_debugger
            scope: loop

      - id: evaluate
        type: claude
        with:
          action: prompt
          model: haiku
          prompt: |
            Evaluate whether this operator note is concrete enough to debug a workflow run.

            Note:
            ${{ steps.draft.result }}

            Approve only if it is concise, mentions at least one command, and gives a clear next action.
          output_schema:
            type: object
            required: [accepted, summary]
            additionalProperties: false
            properties:
              accepted:
                type: boolean
              summary:
                type: string
    exports:
      note: ${{ steps.draft.result }}
      accepted: ${{ steps.evaluate.result.accepted }}
      summary: ${{ steps.evaluate.result.summary }}

  - id: summarize
    type: claude
    with:
      action: prompt
      model: haiku
      prompt: |
        Combine the workflow-scoped checklist and the loop result into a final debug summary.

        Checklist:
        ${{ steps.continue_context.result }}

        Final note:
        ${{ steps.refine.result.note }}
      output_schema:
        type: object
        required: [markdown]
        additionalProperties: false
        properties:
          markdown:
            type: string

  - id: write_snapshot
    type: write_file
    with:
      path: .rigg/debug-conversations.md
      content: |
        # Debug Conversations

        ## Workflow context
        ${{ steps.continue_context.result }}

        ## Loop note
        ${{ steps.refine.result.note }}

        ## Evaluation
        accepted: ${{ steps.refine.result.accepted }}
        summary: ${{ steps.refine.result.summary }}

        ## Final
        ${{ steps.summarize.result.markdown }}
