id: impl
inputs:
  requirements:
    type: string
    description: Path to a markdown file containing implementation requirements

steps:
  - id: validate_inputs
    type: shell
    env:
      REQ_PATH: ${{ inputs.requirements }}
    with:
      command: |
        if [ ! -f "$REQ_PATH" ]; then
          echo "requirements file not found: $REQ_PATH" >&2
          exit 1
        fi
      stdout:
        mode: none

  - id: implement
    type: codex
    with:
      kind: turn
      model: gpt-5.4
      effort: high
      prompt: |
        You are a senior engineer implementing a feature.

        ## Requirements
        Read `${{ inputs.requirements }}` for the full requirements.

        ## Task
        1. If `private/typescript-implementation-guide.md` exists, read it and follow all coding standards.
        2. Implement the requirements.
        4. After implementation is complete, run in order and fix any errors:
           - `bun run format`
           - `bun run check`
           - `bun test`

        ## Rules
        - Do not add comments, docstrings, or documentation unless explicitly required.
        - If a verification command fails, fix the issue before moving on.

  - id: verify
    type: shell
    with:
      command: |
        bun run format > /dev/null 2>&1; FMT=$?
        bun test > /dev/null 2>&1; TEST=$?
        bun run check > /dev/null 2>&1; CHK=$?
        if [ $FMT -ne 0 ] || [ $TEST -ne 0 ] || [ $CHK -ne 0 ]; then
          printf '{"pass":false,"format":%d,"test":%d,"check":%d}\n' "$FMT" "$TEST" "$CHK"
        else
          printf '{"pass":true,"format":0,"test":0,"check":0}\n'
        fi
      stdout:
        mode: json

  - id: fix_loop
    if: ${{ !steps.verify.result.pass }}
    type: loop
    max: 5
    until: ${{ steps.recheck.result.pass }}
    steps:
      - id: fix
        type: cursor
        with:
          mode: agent
          model: composer-2-fast
          prompt: |
            The implementation has errors. Fix them.

            Run these commands in order, read the output, and fix all errors:
            1. `bun run format`
            2. `bun test`
            3. `bun run check`

            Keep fixing until all three pass. Do not add unnecessary comments or documentation.

      - id: recheck
        type: shell
        with:
          command: |
            bun run format > /dev/null 2>&1; FMT=$?
            bun test > /dev/null 2>&1; TEST=$?
            bun run check > /dev/null 2>&1; CHK=$?
            if [ $FMT -ne 0 ] || [ $TEST -ne 0 ] || [ $CHK -ne 0 ]; then
              printf '{"pass":false,"format":%d,"test":%d,"check":%d}\n' "$FMT" "$TEST" "$CHK"
            else
              printf '{"pass":true,"format":0,"test":0,"check":0}\n'
            fi
          stdout:
            mode: json
