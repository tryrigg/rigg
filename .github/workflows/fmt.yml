name: fmt

on:
  pull_request:
    paths:
      - package.json
      - bun.lock
      - tsconfig.json
      - README.md
      - packages/**
      - .github/workflows/fmt.yml
  push:
    branches:
      - main
    paths:
      - package.json
      - bun.lock
      - tsconfig.json
      - README.md
      - packages/**
      - .github/workflows/fmt.yml
  workflow_dispatch:

concurrency:
  group: fmt-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format:check
