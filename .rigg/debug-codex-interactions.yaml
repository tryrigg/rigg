id: debug-codex-interactions
inputs:
  artifact_path:
    type: string
    default: .rigg/debug-codex-interactions-artifact.txt
    minLength: 1
  fallback_label:
    type: string
    default: fallback-label
    minLength: 1
steps:
  - id: codex_interactions
    type: codex
    with:
      action: run
      model: gpt-5.3-codex
      prompt: |
        This run is intentionally for debugging Codex interaction handling inside Rigg.

        Follow this checklist in order:

        1. Ask the operator exactly one user-input question asking for a short debug label.
           - If the operator gives no usable label, use `${{ inputs.fallback_label }}`.
        2. Run exactly one harmless shell command: `pwd`
        3. Write a small text file to `${{ inputs.artifact_path }}` with these lines:
           - purpose=debug-codex-interactions
           - label=<resolved label>
           - command=pwd
        4. Return a short plain-text summary of what happened.

        Constraints:
        - Do not inspect unrelated files.
        - Do not run additional commands.
        - Keep the file contents small and plain text.
        - If an approval is denied, say so plainly in the final summary.

  - id: write_snapshot
    type: write_file
    with:
      path: .rigg/debug-codex-interactions.md
      content: |
        # Debug Codex Interactions

        artifact_path: ${{ inputs.artifact_path }}

        summary:
        ${{ steps.codex_interactions.result }}
