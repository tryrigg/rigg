name: release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-apple-darwin
            runner: macos-13

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --locked --release --target "${{ matrix.target }}" --bin rigg

      - name: Package release archive
        run: |
          archive_name="rigg-${{ matrix.target }}.tar.gz"
          release_dir="target/${{ matrix.target }}/release"

          mkdir -p dist
          cp "${release_dir}/rigg" dist/

          tar -C dist -czf "${archive_name}" rigg

          checksum="$(shasum -a 256 "${archive_name}" | awk '{print $1}')"
          printf '%s  %s\n' "${checksum}" "${archive_name}" > "${archive_name}.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            rigg-${{ matrix.target }}.tar.gz
            rigg-${{ matrix.target }}.tar.gz.sha256

  assemble:
    needs:
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-artifacts
          pattern: release-*
          merge-multiple: true

      - name: Build checksums bundle
        run: cat release-artifacts/*.sha256 | sort -k2 > release-artifacts/rigg-checksums.txt

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: release-artifacts/*
          if-no-files-found: error

  installer-smoke:
    needs:
      - assemble
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
          - runner: macos-13

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download release assets
        uses: actions/download-artifact@v5
        with:
          name: release-assets
          path: release-artifacts

      - name: Smoke test install script
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          TMP_ROOT="$(mktemp -d)"
          mkdir -p "$TMP_ROOT/releases/download/$TAG"
          cp release-artifacts/* "$TMP_ROOT/releases/download/$TAG/"

          env \
            RIGG_VERSION="$VERSION" \
            RIGG_RELEASE_BASE_URL="file://$TMP_ROOT/releases/download" \
            RIGG_INSTALL_DIR="$TMP_ROOT/bin" \
            RIGG_INSTALL_ALLOW_INSECURE_PROTOCOLS=1 \
            bash ./install

          "$TMP_ROOT/bin/rigg" --version

  publish:
    needs:
      - installer-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v5
        with:
          name: release-assets
          path: release-artifacts

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          prerelease: false
          generate_release_notes: true
          files: |
            release-artifacts/*.tar.gz
            release-artifacts/rigg-checksums.txt
          fail_on_unmatched_files: true
