name: release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run check

      - name: Run tests
        run: bun run test

      - name: Build website
        run: bun run --cwd packages/www build

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Lint install script
        run: shellcheck install

      - name: Validate install script syntax
        run: bash -n install

  build:
    needs:
      - quality
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-apple-darwin
            runner: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build standalone CLI
        env:
          RIGG_VERSION: ${{ github.ref_name }}
        run: bun run --cwd packages/rigg build:cli

      - name: Smoke test standalone CLI
        run: |
          tmpdir="$(mktemp -d)"
          expected_version="rigg ${GITHUB_REF_NAME#v}"
          actual_version="$(./packages/rigg/dist/rigg --version)"
          [ "${actual_version}" = "${expected_version}" ]
          cp -R ./packages/rigg/dist/. "$tmpdir/"
          (
            cd "$tmpdir"
            chmod 0755 ./rigg
            [ "$(./rigg --version)" = "${expected_version}" ]
            ./rigg init
            ./rigg validate
            printf '%s\n' \
              'id: plan' \
              'steps:' \
              '  - id: say' \
              '    type: shell' \
              '    with:' \
              '      command: echo hi' > ./.rigg/plan.yaml
            mkdir -p ./xdg
            XDG_DATA_HOME="$tmpdir/xdg" script -q /dev/null ./rigg run plan --auto-continue
            XDG_DATA_HOME="$tmpdir/xdg" ./rigg history | grep "plan"
          )

      - name: Package release archive
        run: |
          archive_name="rigg-${{ matrix.target }}.tar.gz"

          mkdir -p dist
          cp -R packages/rigg/dist/. dist/

          tar -C dist -czf "${archive_name}" rigg

          checksum="$(shasum -a 256 "${archive_name}" | awk '{print $1}')"
          printf '%s  %s\n' "${checksum}" "${archive_name}" > "${archive_name}.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            rigg-${{ matrix.target }}.tar.gz
            rigg-${{ matrix.target }}.tar.gz.sha256

  assemble:
    needs:
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-artifacts
          pattern: release-*
          merge-multiple: true

      - name: Build checksums bundle
        run: cat release-artifacts/*.sha256 | sort -k2 > release-artifacts/rigg-checksums.txt

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: release-artifacts/*
          if-no-files-found: error

  installer-smoke:
    needs:
      - assemble
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
          - runner: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download release assets
        uses: actions/download-artifact@v5
        with:
          name: release-assets
          path: release-artifacts

      - name: Smoke test install script
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          EXPECTED_VERSION="rigg ${VERSION}"
          TMP_ROOT="$(mktemp -d)"
          mkdir -p "$TMP_ROOT/releases/download/$TAG"
          mkdir -p "$TMP_ROOT/project"
          cp release-artifacts/* "$TMP_ROOT/releases/download/$TAG/"

          env \
            RIGG_VERSION="$VERSION" \
            RIGG_RELEASE_BASE_URL="file://$TMP_ROOT/releases/download" \
            RIGG_INSTALL_DIR="$TMP_ROOT/bin" \
            RIGG_INSTALL_ALLOW_INSECURE_PROTOCOLS=1 \
            bash -c "curl -fsSL file://$PWD/install | bash"

          [ "$("$TMP_ROOT/bin/rigg" --version)" = "${EXPECTED_VERSION}" ]
          (
            cd "$TMP_ROOT/project"
            "$TMP_ROOT/bin/rigg" init
            "$TMP_ROOT/bin/rigg" validate
            printf '%s\n' \
              'id: plan' \
              'steps:' \
              '  - id: say' \
              '    type: shell' \
              '    with:' \
              '      command: echo hi' > ./.rigg/plan.yaml
            mkdir -p "$TMP_ROOT/xdg"
            XDG_DATA_HOME="$TMP_ROOT/xdg" script -q /dev/null "$TMP_ROOT/bin/rigg" run plan --auto-continue
            XDG_DATA_HOME="$TMP_ROOT/xdg" "$TMP_ROOT/bin/rigg" history | grep "plan"
          )

  publish:
    needs:
      - installer-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v5
        with:
          name: release-assets
          path: release-artifacts

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          prerelease: false
          generate_release_notes: true
          files: |
            release-artifacts/*.tar.gz
            release-artifacts/rigg-checksums.txt
          fail_on_unmatched_files: true

  attest:
    needs:
      - publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      attestations: write
      id-token: write

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v5
        with:
          name: release-assets
          path: release-artifacts

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            release-artifacts/*.tar.gz
            release-artifacts/rigg-checksums.txt
