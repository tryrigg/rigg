name: fmt

on:
  pull_request:
    paths:
      - crates/**
      - Cargo.toml
      - Cargo.lock
      - rust-toolchain.toml
      - rustfmt.toml
      - .github/workflows/fmt.yml
  push:
    branches:
      - main
    paths:
      - crates/**
      - Cargo.toml
      - Cargo.lock
      - rust-toolchain.toml
      - rustfmt.toml
      - .github/workflows/fmt.yml
  workflow_dispatch:

concurrency:
  group: fmt-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          components: rustfmt

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check
