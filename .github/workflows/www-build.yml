name: www-build

on:
  pull_request:
    paths:
      - install
      - www/**
      - .github/workflows/www-build.yml
  push:
    branches:
      - main
    paths:
      - install
      - www/**
      - .github/workflows/www-build.yml
  workflow_dispatch:

concurrency:
  group: www-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  www-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: www

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Astro type/content checks
        run: bun run check

      - name: Build website
        run: bun run build
