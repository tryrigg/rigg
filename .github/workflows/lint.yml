name: lint

on:
  pull_request:
    paths:
      - crates/**
      - Cargo.toml
      - Cargo.lock
      - rust-toolchain.toml
      - clippy.toml
      - .github/workflows/lint.yml
  push:
    branches:
      - main
    paths:
      - crates/**
      - Cargo.toml
      - Cargo.lock
      - rust-toolchain.toml
      - clippy.toml
      - .github/workflows/lint.yml
  workflow_dispatch:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          components: clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Lint (clippy)
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
