id: plan
inputs:
  requirements:
    type: string
    description: Requirements for the implementation plan
  output_path:
    type: string
    description: Path to write the generated plan
steps:
  - id: draft
    type: codex
    with:
      action: run
      model: gpt-5.4
      prompt: |
        Draft a detailed implementation plan from the requirements below.

        Requirements:
        ${{ inputs.requirements }}
      output:
        schema:
          type: object
          required: [markdown]
          additionalProperties: false
          properties:
            markdown:
              type: string

  - id: critique
    type: codex
    with:
      action: run
      model: gpt-5.4
      prompt: |
        Review this implementation plan critically.
        Identify ambiguities, flawed assumptions, and missing edge cases.

        Draft:
        ${{ steps.draft.result.markdown }}
      output:
        schema:
          type: object
          required: [has_findings, findings]
          additionalProperties: false
          properties:
            has_findings:
              type: boolean
            findings:
              type: array
              items:
                type: object
                required: [description, suggestion]
                additionalProperties: false
                properties:
                  description:
                    type: string
                  suggestion:
                    type: string

  - id: finalize
    type: branch
    cases:
      - if: ${{ steps.critique.result.has_findings }}
        steps:
          - id: improve
            type: codex
            with:
              action: run
              model: gpt-5.4
              prompt: |
                Improve the plan using the findings below.

                Original draft:
                ${{ steps.draft.result.markdown }}

                Findings:
                ${{ toJSON(steps.critique.result.findings) }}
              output:
                schema:
                  type: object
                  required: [markdown]
                  additionalProperties: false
                  properties:
                    markdown:
                      type: string
        exports:
          markdown: ${{ steps.improve.result.markdown }}
      - else:
        steps:
          - id: noop
            type: shell
            with:
              command: "true"
              result: none
        exports:
          markdown: ${{ steps.draft.result.markdown }}

  - id: write
    type: write_file
    with:
      path: ${{ inputs.output_path }}
      content: ${{ steps.finalize.result.markdown }}
