name: check

on:
  pull_request:
    paths:
      - package.json
      - bun.lock
      - tsconfig.json
      - packages/rigg/**
      - .github/workflows/lint.yml
  push:
    branches:
      - main
    paths:
      - package.json
      - bun.lock
      - tsconfig.json
      - packages/rigg/**
      - .github/workflows/lint.yml
  workflow_dispatch:

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check CLI
        run: bun run check:rigg
