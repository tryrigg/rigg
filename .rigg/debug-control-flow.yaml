id: debug-control-flow
inputs:
  target_iterations:
    type: integer
    default: 2
    minimum: 1
    maximum: 3
  route:
    type: string
    enum: ["single", "parallel"]
    default: parallel
  emit_optional_note:
    type: boolean
    default: true
steps:
  - id: gather
    type: group
    steps:
      - id: baseline
        type: shell
        with:
          command: echo "route=${{ inputs.route }}"
          result: text

      - id: metadata
        type: shell
        env:
          ROUTE: ${{ inputs.route }}
          TARGET_ITERATIONS: ${{ inputs.target_iterations }}
        with:
          command: |
            printf '{"route":"%s","target_iterations":%s}\n' "$ROUTE" "$TARGET_ITERATIONS"
          result: json
    exports:
      baseline: ${{ steps.baseline.result }}
      route: ${{ steps.metadata.result.route }}
      target_iterations: ${{ steps.metadata.result.target_iterations }}

  - id: maybe_note
    if: ${{ inputs.emit_optional_note }}
    type: shell
    with:
      command: echo "optional-note=${{ steps.gather.result.route }}"
      result: text

  - id: decide
    type: branch
    cases:
      - if: ${{ steps.gather.result.route == "parallel" }}
        steps:
          - id: choose_parallel
            type: shell
            with:
              command: printf '{"executor":"parallel"}\n'
              result: json
        exports:
          executor: ${{ steps.choose_parallel.result.executor }}
          limit: ${{ steps.gather.result.target_iterations }}
      - else:
        steps:
          - id: choose_single
            type: shell
            with:
              command: printf '{"executor":"single"}\n'
              result: json
        exports:
          executor: ${{ steps.choose_single.result.executor }}
          limit: ${{ steps.gather.result.target_iterations }}

  - id: iterate
    type: loop
    max: 3
    until: ${{ steps.stop.result.done }}
    steps:
      - id: tick
        type: shell
        with:
          command: echo "iteration=${{ run.iteration }} path=${{ run.node_path }} executor=${{ steps.decide.result.executor }}"
          result: text

      - id: stop
        type: shell
        env:
          DONE: ${{ run.iteration >= steps.decide.result.limit }}
          LABEL: ${{ format('{0}-{1}', steps.decide.result.executor, run.iteration) }}
        with:
          command: |
            printf '{"done":%s,"label":"%s"}\n' "$DONE" "$LABEL"
          result: json
    exports:
      last_tick: ${{ steps.tick.result }}
      label: ${{ steps.stop.result.label }}

  - id: fanout
    type: parallel
    branches:
      - id: summary
        steps:
          - id: emit_summary
            type: shell
            with:
              command: echo "summary:${{ steps.iterate.result.label }}"
              result: text
      - id: trace
        steps:
          - id: emit_trace
            type: shell
            env:
              LABEL: ${{ steps.iterate.result.label }}
              ROUTE: ${{ steps.decide.result.executor }}
            with:
              command: |
                printf '{"label":"%s","route":"%s"}\n' "$LABEL" "$ROUTE"
              result: json
    exports:
      summary: ${{ steps.emit_summary.result }}
      trace: ${{ steps.emit_trace.result }}

  - id: write_snapshot
    type: write_file
    with:
      path: .rigg/debug-control-flow.md
      content: |
        # Debug Control Flow

        baseline: ${{ steps.gather.result.baseline }}
        executor: ${{ steps.decide.result.executor }}
        last_tick: ${{ steps.iterate.result.last_tick }}
        summary: ${{ steps.fanout.result.summary }}
        trace: ${{ toJSON(steps.fanout.result.trace) }}
